name: SonarQube
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # 关键：检查gradlew并添加执行权限+修复换行符
      - name: Fix gradlew permissions and line endings
        run: |
          if [ -f "./gradlew" ]; then
            sed -i 's/\r$//' gradlew  # 把CRLF转成LF，兼容Linux
            chmod +x gradlew          # 添加执行权限
          else
            echo "gradlew not found, generating wrapper"
            gradle wrapper             # 自动生成gradlew
          fi

      - name: Build and analyze
        run: ./gradlew clean assembleDebug sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
